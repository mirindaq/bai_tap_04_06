server:
  port: 8088

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api-gateway/product-service/**
              filters:
                - StripPrefix=1
            - id: customer-service
              uri: lb://CUSTOMER-SERVICE
              predicates:
                - Path=/api-gateway/customer-service/**
              filters:
                - StripPrefix=1
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api-gateway/order-service/**
              filters:
                - StripPrefix=1
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    cors:
      allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:*}
    jwt:
      secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-chars}
