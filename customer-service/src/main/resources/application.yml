server:
  port: 8082
  servlet:
    context-path: /customer-service

spring:
  application:
    name: customer-service

  datasource:
    url: jdbc:mariadb://localhost:3307/customer_db
    username: root
    password: 123456
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

api:
  prefix: /api/v1

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-chars}
      access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
