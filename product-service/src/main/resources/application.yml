server:
  port: 8081

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:mariadb://localhost:3306/product_db
    username: root
    password: 123456
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
